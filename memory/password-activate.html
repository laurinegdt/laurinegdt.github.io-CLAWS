<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CLAW — Activate password</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body class="page page--password" data-claw-guard>
  <main class="password-page">
    <h1 class="password-page__title">NEW PASSWORD</h1>
    <p class="password-page__saved-name" id="saved-password-name"></p>

    <form class="password-page__form" id="activate-form" novalidate>
      <fieldset class="signal-field">
        <legend class="signal-field__label">activate by</legend>
        <select id="activate-by" class="signal-select" required>
          <option value="" disabled selected>Select…</option>
          <option value="gesture">gesture</option>
          <option value="voice">voice</option>
        </select>
      </fieldset>

      <fieldset class="signal-field" id="gesture-section" hidden>
        <legend class="signal-field__label">gesture sequence (3–5 moves)</legend>
        <p class="gesture-seq-display" id="gesture-seq-display">—</p>
        <div class="gesture-record-btns">
          <button type="button" class="gesture-record-btn" data-gesture="tap">tap</button>
          <button type="button" class="gesture-record-btn" data-gesture="left">left</button>
          <button type="button" class="gesture-record-btn" data-gesture="right">right</button>
        </div>
        <button type="button" class="gesture-clear-btn" id="gesture-clear">clear sequence</button>
      </fieldset>

      <button type="button" class="menu__btn password-page__connect" id="connect-xiao-btn">Connect XIAO</button>
      <p class="password-page__ble-hint" id="ble-hint">Connect your XIAO Chat before saving.</p>

      <button type="submit" class="signal-save" id="save-btn" disabled>Save</button>
    </form>

    <a href="new-password.html" class="back-link password-page__back">← Back</a>
  </main>
  <script src="../claw-storage.js"></script>
  <script src="../claw-context.js"></script>
  <script src="password-storage.js"></script>
  <script src="../ble-client.js"></script>
  <script src="../ble-status-ui.js"></script>
  <script src="password-activate.js"></script>
  <script>ClawContext.boot({ guard: true });</script>
</body>

</html>
