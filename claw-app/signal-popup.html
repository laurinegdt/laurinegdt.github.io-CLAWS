<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CLAW — Signal detected</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .signal-popup-page {
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      background: rgba(28, 28, 28, 0.28);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .signal-popup {
      width: min(100%, 22rem);
      animation: signal-popup-in 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes signal-popup-in {
      from {
        opacity: 0;
        transform: translateY(1.25rem) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .signal-popup__shell {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 18px;
      box-shadow:
        0 18px 48px rgba(var(--accent-rgb), 0.22),
        0 4px 18px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .signal-popup__bar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 1rem;
      background: linear-gradient(145deg, rgba(var(--accent-rgb), 0.16), rgba(var(--accent-rgb), 0.06));
      border-bottom: 1px solid var(--card-border);
    }

    .signal-popup__pulse {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0.45);
      animation: signal-popup-pulse 1.6s ease-out infinite;
      flex-shrink: 0;
    }

    @keyframes signal-popup-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0.45);
      }
      70% {
        box-shadow: 0 0 0 0.55rem rgba(var(--accent-rgb), 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(var(--accent-rgb), 0);
      }
    }

    .signal-popup__alert {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .signal-popup__body {
      padding: 1.35rem 1.25rem 1.15rem;
    }

    .signal-popup__brand {
      display: block;
      width: clamp(7rem, 42vw, 9rem);
      height: auto;
      margin: 0 auto 1rem;
      opacity: 0.92;
    }

    .signal-popup__card {
      margin: 0;
      border-radius: 14px;
    }

    .signal-popup__actions {
      display: flex;
      gap: 0.65rem;
      padding: 0 1.25rem 1.25rem;
    }

    .signal-popup__btn {
      flex: 1;
      padding: 0.85rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .signal-popup__btn:active {
      transform: scale(0.98);
    }

    .signal-popup__btn--primary {
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent);
    }

    .signal-popup__btn--ghost {
      color: var(--text-muted);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
    }
  </style>
</head>
<body class="page signal-popup-page">
  <div class="signal-popup" role="dialog" aria-labelledby="signal-popup-title" aria-modal="true">
    <div class="signal-popup__shell">
      <div class="signal-popup__bar">
        <span class="signal-popup__pulse" aria-hidden="true"></span>
        <p class="signal-popup__alert" id="signal-popup-title">New signal detected</p>
      </div>

      <div class="signal-popup__body">
        <img
          class="signal-popup__brand"
          src="images/Laurine_titre_CLAWS.png"
          alt="CLAWS"
          width="144"
          height="40"
        >

        <article class="id-card id-card--active signal-popup__card">
          <p class="id-card__header">Signal</p>
          <p class="id-card__name" id="signal-name">dd !!!</p>
          <p class="id-card__message" id="signal-message">party, chosen diversity,
geo coordinates 46.556451, 6.610539
23.00 - 05:00</p>
        </article>
      </div>

      <div class="signal-popup__actions">
        <button type="button" class="signal-popup__btn signal-popup__btn--ghost" id="dismiss-btn">Dismiss</button>
        <button type="button" class="signal-popup__btn signal-popup__btn--primary" id="view-btn">View signal</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var nameEl = document.getElementById('signal-name');
      var messageEl = document.getElementById('signal-message');

      if (params.get('name')) {
        nameEl.textContent = params.get('name');
      }
      if (params.get('message')) {
        messageEl.textContent = params.get('message');
      }

      document.getElementById('dismiss-btn').addEventListener('click', function () {
        window.close();
      });

      document.getElementById('view-btn').addEventListener('click', function () {
        window.location.href = 'my-claw/my-claws.html';
      });
    })();
  </script>
</body>
</html>
