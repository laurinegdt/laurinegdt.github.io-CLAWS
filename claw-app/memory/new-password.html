<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CLAW — New password</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page page--password" data-claw-guard>
  <main class="password-page">
    <h1 class="password-page__title">NEW PASSWORD</h1>

    <form class="password-page__form" id="new-password-form" novalidate>
      <fieldset class="signal-field">
        <legend class="signal-field__label">name</legend>
        <input
          type="text"
          id="password-name"
          class="signal-input"
          placeholder="password name"
          autocomplete="off"
          required
        >
      </fieldset>

      <fieldset class="signal-field">
        <legend class="signal-field__label">password</legend>
        <div class="password-input-wrap">
          <input
            type="password"
            id="password-value"
            class="signal-input password-input-wrap__input"
            placeholder="enter password"
            autocomplete="new-password"
            required
          >
          <button
            type="button"
            class="password-input-wrap__toggle"
            id="password-toggle"
            aria-label="Show password"
            aria-pressed="false"
          >
            <span class="password-input-wrap__icon password-input-wrap__icon--show" aria-hidden="true">&#9673;</span>
            <span class="password-input-wrap__icon password-input-wrap__icon--hide" aria-hidden="true">&#9675;</span>
          </button>
        </div>
      </fieldset>

      <button type="submit" class="signal-save">Save</button>
    </form>

    <a href="../my-claw/assign-password.html" class="back-link password-page__back" data-claw-back="assign-password">← Back</a>
  </main>
  <script src="../ble-client.js"></script>
  <script src="../ble-status-ui.js"></script>
  <script src="../claw-storage.js"></script>
  <script src="../claw-context.js"></script>
  <script src="password-storage.js"></script>
  <script>
    if (window.ClawStorage && ClawStorage.getAccessMode() === 'nfc') {
      window.location.replace('../my-claw/my-claw.html');
    }
  </script>
  <script src="new-password.js"></script>
  <script>ClawContext.boot({ guard: true });</script>
</body>
</html>
