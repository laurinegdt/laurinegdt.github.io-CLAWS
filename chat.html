<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLE Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .status {
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-weight: 500;
        text-align: center;
      }

      .status.disconnected {
        background: #fee;
        color: #c33;
      }

      .status.connected {
        background: #efe;
        color: #3c3;
      }

      button {
        width: 100%;
        padding: 15px 30px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 15px;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #connectBtn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      #disconnectBtn {
        background: #f44336;
        color: white;
      }

      .chat-section {
        margin-top: 30px;
        display: none;
      }

      .chat-section.active {
        display: block;
      }

      .messages {
        background: #f5f5f5;
        border-radius: 10px;
        padding: 20px;
        height: 300px;
        overflow-y: auto;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        padding: 10px 15px;
        border-radius: 15px;
        max-width: 80%;
        word-wrap: break-word;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.sent {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 5px;
      }

      .message.received {
        background: #e3f2fd;
        color: #333;
        align-self: flex-start;
        border-bottom-left-radius: 5px;
      }

      .message-time {
        font-size: 10px;
        opacity: 0.7;
        margin-top: 5px;
        display: block;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }

      #messageInput {
        flex: 1;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
        transition: border-color 0.3s ease;
      }

      #messageInput:focus {
        outline: none;
        border-color: #667eea;
      }

      #sendBtn {
        width: auto;
        padding: 15px 30px;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      #sendBtn:disabled {
        background: #ccc;
      }

      .empty-state {
        text-align: center;
        color: #999;
        padding: 40px 20px;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>💬 BLE Chat</h1>
      <p class="subtitle">Web Bluetooth Messaging</p>

      <div id="status" class="status disconnected">Disconnected</div>

      <button id="connectBtn">Connect to Device</button>
      <button id="disconnectBtn" style="display: none">Disconnect</button>

      <div class="chat-section" id="chatSection">
        <div class="messages" id="messages">
          <div class="empty-state">No messages yet. Send a message to start chatting!</div>
        </div>

        <div class="input-group">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            maxlength="100"
          />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <script src="ble-client.js"></script>
    <script src="ble-status-ui.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
